
services:
  db:
    image: postgres:15
    container_name: finance-db
    restart: always
    environment:
      POSTGRES_DB: financetrackerapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Masoko
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: finance-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/financetrackerapi
      DB_USERNAME: postgres
      DB_PASSWORD: Masoko
      API_KEY: AIzaSyBiJM164qMN1rbsDBODcTqqrWvLslyaBJs

volumes:
  postgres_data:


